<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Aquarium Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-moment@1.0.1/dist/chartjs-adapter-moment.min.js"></script>
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header class="glass-panel header">
            <h1>Smart Aquarium</h1>
            <div class="status-indicator">
                <span id="conn-status" class="dot loading"></span>
                <span id="conn-text">Connecting...</span>
            </div>
        </header>

        <main>
            <!-- Current Status Cards -->
            <section class="cards-grid">
                <div class="glass-panel card">
                    <div class="card-icon temp-icon"></div>
                    <div class="card-content">
                        <h3>Internal Temp</h3>
                        <p class="value" id="val-int-temp">--°C</p>
                    </div>
                </div>
                <div class="glass-panel card">
                    <div class="card-icon temp-icon-alt"></div>
                    <div class="card-content">
                        <h3>External Temp</h3>
                        <p class="value" id="val-ext-temp">--°C</p>
                    </div>
                </div>
                <div class="glass-panel card">
                    <div class="card-icon relay-icon"></div>
                    <div class="card-content">
                        <h3>Relays</h3>
                        <div class="relays-container" id="val-relays">
                            <span class="relay-badge" id="relay-1">1</span>
                            <span class="relay-badge" id="relay-2">2</span>
                            <span class="relay-badge" id="relay-3">3</span>
                        </div>
                    </div>
                </div>
                <div class="glass-panel card">
                    <div class="card-icon uptime-icon"></div>
                    <div class="card-content">
                        <h3>Uptime</h3>
                        <p class="value value-small" id="val-uptime">--</p>
                    </div>
                </div>
            </section>

            <!-- Temperature Chart -->
            <section class="glass-panel chart-section">
                <div class="section-header">
                    <h2>Temperature History</h2>
                    <div class="controls">
                        <select id="time-range" class="glass-input">
                            <option value="60">Last 1 Hour</option>
                            <option value="720">Last 12 Hours</option>
                            <option value="1440" selected>Last 24 Hours</option>
                            <option value="4320">Last 3 Days</option>
                            <option value="10080">Last 7 Days</option>
                        </select>
                        <button id="refresh-btn" class="glass-button">Refresh</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="tempChart"></canvas>
                </div>
            </section>

            <!-- System Logs -->
            <section class="glass-panel logs-section">
                <div class="section-header">
                    <h2>System Logs</h2>
                    <div class="controls">
                        <input type="text" id="log-search" class="glass-input" placeholder="Search logs...">
                    </div>
                </div>
                <div class="logs-container">
                    <table class="logs-table">
                        <thead>
                            <tr>
                                <th>Time</th>
                                <th>Message</th>
                            </tr>
                        </thead>
                        <tbody id="logs-body">
                            <!-- Logs injected here via JS -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
        
        <footer class="footer">
            <p>Smart Aquarium Collector Dashboard &bull; Last updated: <span id="last-updated">--</span></p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="/static/app.js"></script>
</body>
</html>
